services:
  - type: web
    name: visionmate-ai
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt && python -c "import matplotlib; matplotlib.font_manager._load_fontmanager()"
    startCommand: bash -c "cd backend && MPLCONFIGDIR=/tmp/matplotlib MPLBACKEND=Agg uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MPLBACKEND
        value: Agg
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib
