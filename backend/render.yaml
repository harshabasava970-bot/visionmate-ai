services:
  - type: web
    name: visionmate-ai
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt
    startCommand: bash -c "cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
