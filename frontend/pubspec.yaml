name: visionmate_ai
description: AI-powered assistant for blind and visually impaired users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Camera ──────────────────────────────────────────────────────────────────
  camera: ^0.10.5+9

  # ── HTTP & Networking ────────────────────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1

  # ── Audio / TTS ──────────────────────────────────────────────────────────────
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0

  # ── Speech Recognition ───────────────────────────────────────────────────────
  speech_to_text: ^6.6.2

  # ── Location ─────────────────────────────────────────────────────────────────
  geolocator: ^12.0.0

  # ── Haptics & Sensors ────────────────────────────────────────────────────────
  vibration: ^2.0.0
  sensors_plus: ^5.0.1
  battery_plus: ^6.0.1

  # ── State Management ─────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Storage ──────────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── UI ───────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── Permissions ──────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

  # ── Utilities ────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
